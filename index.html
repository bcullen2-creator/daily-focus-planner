<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Focus Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <p class="eyebrow">Daily Focus Planner</p>
      <h1>Keep work and life tasks clear, simple, and in one place.</h1>
      <p class="hero-copy">
        Add tasks, split them into work or personal, and keep track of what is done without losing focus.
      </p>
    </section>

    <section class="planner-card">
      <form class="task-form" id="task-form">
        <div class="field">
          <label for="task-title">Task</label>
          <input id="task-title" name="task-title" type="text" placeholder="Finish weekly report" maxlength="100" required>
        </div>

        <div class="field">
          <label for="task-category">Category</label>
          <select id="task-category" name="task-category">
            <option value="work">Work</option>
            <option value="personal">Personal</option>
          </select>
        </div>

        <button class="add-task-button" type="submit">Add Task</button>
      </form>

      <section class="task-board">
        <div class="task-column">
          <div class="column-header">
            <h2>Work</h2>
            <span id="work-count">0 tasks</span>
          </div>
          <ul class="task-list" id="work-list" aria-label="Work tasks"></ul>
        </div>

        <div class="task-column">
          <div class="column-header">
            <h2>Personal</h2>
            <span id="personal-count">0 tasks</span>
          </div>
          <ul class="task-list" id="personal-list" aria-label="Personal tasks"></ul>
        </div>
      </section>

      <section class="completed-panel">
        <div class="column-header">
          <h2>Completed</h2>
          <span id="completed-count">0 done</span>
        </div>
        <ul class="task-list completed-list" id="completed-list" aria-label="Completed tasks"></ul>
      </section>
    </section>
  </main>

  <template id="task-template">
    <li class="task-item">
      <div class="task-content">
        <p class="task-title"></p>
        <span class="task-badge"></span>
      </div>
      <div class="task-actions">
        <button class="secondary-button" data-action="toggle" type="button">Complete</button>
        <button class="danger-button" data-action="delete" type="button">Delete</button>
      </div>
    </li>
  </template>

  <script src="script.js"></script>
</body>
</html>
